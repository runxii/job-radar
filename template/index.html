<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobRadar</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #94a3b8;
      margin-bottom: 32px;
    }

    /* Stats bar */
    #stats {
      display: flex;
      gap: 20px;
      margin-bottom: 36px;
      font-size: 0.8rem;
      color: #64748b;
    }
    #stats span { color: #94a3b8; font-weight: 600; }

    /* Card */
    #card-wrap {
      width: 100%;
      max-width: 480px;
    }

    .card {
      background: #1e2433;
      border: 1px solid #2d3748;
      border-radius: 16px;
      padding: 28px 28px 24px;
      position: relative;
    }

    .score-badge {
      position: absolute;
      top: 24px;
      right: 24px;
      font-size: 1.1rem;
      font-weight: 700;
    }
    .score-high  { color: #34d399; }
    .score-mid   { color: #fbbf24; }
    .score-low   { color: #f87171; }

    .card-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 4px;
      padding-right: 60px;
    }

    .card-company {
      font-size: 0.9rem;
      color: #94a3b8;
      margin-bottom: 10px;
    }

    .card-location {
      font-size: 0.78rem;
      color: #64748b;
      margin-bottom: 20px;
    }

    .card-status {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 999px;
      background: #2d3748;
      color: #94a3b8;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .card-link {
      display: inline-block;
      font-size: 0.82rem;
      color: #60a5fa;
      text-decoration: none;
      margin-bottom: 28px;
      word-break: break-all;
    }
    .card-link:hover { text-decoration: underline; }

    /* Buttons */
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    button {
      padding: 10px 0;
      border: none;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-apply  { background: #34d399; color: #0f1117; }
    .btn-save   { background: #60a5fa; color: #0f1117; }
    .btn-skip   { background: #2d3748; color: #94a3b8; }

    /* Done state */
    .done-msg {
      text-align: center;
      color: #64748b;
      font-size: 0.95rem;
      padding: 60px 0;
    }
    .done-msg strong { display: block; font-size: 2rem; margin-bottom: 12px; }

    /* Loading */
    .loading { text-align: center; color: #64748b; padding: 60px 0; }
  </style>
</head>
<body>

<h1>📡 JobRadar</h1>

<div id="stats">
  Loading stats...
</div>

<div id="card-wrap">
  <div class="loading">Loading...</div>
</div>

<script>
  let currentId = null;

  function scoreClass(score) {
    if (score >= 0.65) return "score-high";
    if (score >= 0.40) return "score-mid";
    return "score-low";
  }

  function renderCard(job) {
    if (job.done) {
      document.getElementById("card-wrap").innerHTML = `
        <div class="done-msg">
          <strong>🎉</strong>
          No more jobs to review.<br>Run the pipeline again tomorrow.
        </div>`;
      return;
    }

    currentId = job.id;
    const score = (job.match_score ?? 0).toFixed(2);
    const cls   = scoreClass(job.match_score ?? 0);

    document.getElementById("card-wrap").innerHTML = `
      <div class="card">
        <span class="score-badge ${cls}">${score}</span>
        <div class="card-title">${esc(job.title)}</div>
        <div class="card-company">${esc(job.company)}</div>
        <div class="card-location">${esc(job.location)}</div>
        <span class="card-status">${esc(job.status)}</span><br>
        <a class="card-link" href="${esc(job.post_url)}" target="_blank" rel="noopener">
          View on LinkedIn &rarr;
        </a>
        <div class="actions">
          <button class="btn-apply" onclick="action('Applied')">Apply</button>
          <button class="btn-save"  onclick="action('Saved')">Save</button>
          <button class="btn-skip"  onclick="action('Skipped')">Skip</button>
        </div>
      </div>`;
  }

  async function loadNext() {
    document.getElementById("card-wrap").innerHTML = `<div class="loading">Loading...</div>`;
    const res  = await fetch("/api/jobs/next");
    const data = await res.json();
    renderCard(data);
  }

  async function action(status) {
    if (!currentId) return;
    // If applying, open link first
    if (status === "Applied") {
      const card = document.querySelector(".card-link");
      if (card) window.open(card.href, "_blank");
    }
    // Disable buttons while updating
    document.querySelectorAll("button").forEach(b => b.disabled = true);
    await fetch(`/api/jobs/${currentId}/status`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ status })
    });
    await loadStats();
    await loadNext();
  }

  async function loadStats() {
    const res  = await fetch("/api/stats");
    const data = await res.json();
    const el   = document.getElementById("stats");
    const order = ["AI Apply", "Human Apply", "Applied", "Saved", "Skipped", "Drop"];
    el.innerHTML = order
      .filter(k => data[k])
      .map(k => `${k}: <span>${data[k]}</span>`)
      .join(" &nbsp;·&nbsp; ");
  }

  function esc(str) {
    return String(str ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  // Boot
  loadStats();
  loadNext();
</script>
</body>
</html>
