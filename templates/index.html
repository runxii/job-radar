<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobRadar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
  /* ── Global Scale (simulate Chrome 150%) ───────────────────── */
  :root {
  --scale: 1.5;
  }

  html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  line-height: 1.6;

  /* scale */
  zoom: var(--scale);
  }

  /* ── Reset ─────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
      --bg:        #0d0d0d;
      --surface:   #141414;
      --border:    #222;
      --muted:     #3a3a3a;
      --dim:       #555;
      --text:      #ccc;
      --bright:    #eee;
      --green:     #4ade80;
      --yellow:    #facc15;
      --red:       #f87171;
      --blue:      #60a5fa;
      --purple:    #a78bfa;
      --font:      'Fira Code', monospace;
  }


  /* ── Layout ─────────────────────────────────────────────── */
  .shell {
      display: grid;
      grid-template-rows: auto auto 1fr;
      height: 100vh;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 16px;
  }

  /* ── Header ─────────────────────────────────────────────── */
  header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      padding: 20px 0 12px;
      border-bottom: 1px solid var(--border);
  }

  .logo {
      font-size: 15px;
      font-weight: 600;
      color: var(--bright);
      letter-spacing: 0.04em;
  }

  .logo span { color: var(--green); }

  #stats-bar {
      font-size: 11px;
      color: var(--dim);
      margin-left: auto;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: flex-end;
  }

  #stats-bar .stat { cursor: pointer; }
  #stats-bar .stat:hover { color: var(--text); }
  #stats-bar .stat .n { color: var(--bright); font-weight: 500; }

  /* ── Nav ────────────────────────────────────────────────── */
  nav {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      scrollbar-width: none;
  }
  nav::-webkit-scrollbar { display: none; }

  .nav-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--dim);
      font-family: var(--font);
      font-size: 11px;
      padding: 10px 16px;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.1s, border-color 0.1s;
      margin-bottom: -1px;
  }
  .nav-btn:hover { color: var(--text); }
  .nav-btn.active {
      color: var(--green);
      border-bottom-color: var(--green);
  }

  /* ── Main pane ───────────────────────────────────────────── */
  main {
      overflow-y: auto;
      padding: 20px 0 40px;
  }

  /* ── Card view ───────────────────────────────────────────── */
  #card-view { display: none; }
  #card-view.visible { display: block; }

  .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 24px;
      max-width: 560px;
      margin: 0 auto;
      position: relative;
  }

  .card-score {
      position: absolute;
      top: 20px; right: 20px;
      font-size: 18px;
      font-weight: 600;
  }

  .card-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--bright);
      padding-right: 56px;
      margin-bottom: 4px;
  }

  .card-meta {
      font-size: 11px;
      color: var(--dim);
      margin-bottom: 6px;
  }

  .tag {
      display: inline-block;
      font-size: 10px;
      padding: 1px 8px;
      border-radius: 2px;
      border: 1px solid var(--muted);
      color: var(--dim);
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
  }

  .card-link {
      display: block;
      font-size: 11px;
      color: var(--blue);
      text-decoration: none;
      margin-bottom: 20px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
  }
  .card-link:hover { text-decoration: underline; }

  .card-actions {
      display: flex;
      gap: 8px;
  }

  .btn {
      font-family: var(--font);
      font-size: 11px;
      padding: 6px 16px;
      border-radius: 2px;
      border: 1px solid var(--muted);
      background: none;
      color: var(--text);
      cursor: pointer;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
      letter-spacing: 0.04em;
  }
  .btn:hover  { background: var(--muted); color: var(--bright); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-apply  { border-color: var(--green); color: var(--green); }
  .btn-apply:hover  { background: var(--green); color: var(--bg); }
  .btn-save   { border-color: var(--blue);  color: var(--blue);  }
  .btn-save:hover   { background: var(--blue);  color: var(--bg); }
  .btn-danger { border-color: var(--red);   color: var(--red);   }
  .btn-danger:hover { background: var(--red); color: var(--bg); }

  /* ── List view ───────────────────────────────────────────── */
  #list-view { display: none; }
  #list-view.visible { display: block; }

  .list-header {
      display: grid;
      grid-template-columns: 1fr 160px 140px 110px 72px;
      gap: 8px;
      padding: 0 8px 6px;
      font-size: 10px;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 1px solid var(--border);
  }

  .list-row {
      display: grid;
      grid-template-columns: 1fr 160px 140px 110px 72px;
      gap: 8px;
      align-items: center;
      padding: 9px 8px;
      border-bottom: 1px solid var(--border);
      transition: background 0.08s;
  }
  .list-row:hover { background: var(--surface); }

  .list-row .col-title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--bright);
      font-size: 12px;
  }
  .list-row .col-title a {
      color: inherit;
      text-decoration: none;
  }
  .list-row .col-title a:hover { text-decoration: underline; color: var(--blue); }

  .list-row .col-company,
  .list-row .col-date {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--dim);
      font-size: 11px;
  }

  .status-pill {
      display: inline-block;
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 2px;
      border: 1px solid;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
  }

  .col-actions {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
  }

  .icon-btn {
      background: none;
      border: none;
      color: var(--dim);
      font-family: var(--font);
      font-size: 12px;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 2px;
      transition: color 0.1s, background 0.1s;
  }
  .icon-btn:hover        { color: var(--bright); background: var(--muted); }
  .icon-btn.del:hover    { color: var(--red); }

  /* ── Status select dropdown ──────────────────────────────── */
  select.status-select {
      font-family: var(--font);
      font-size: 10px;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--muted);
      border-radius: 2px;
      padding: 2px 4px;
      cursor: pointer;
      outline: none;
  }
  select.status-select:focus { border-color: var(--blue); }

  /* ── Empty / loading ─────────────────────────────────────── */
  .empty {
      text-align: center;
      color: var(--dim);
      padding: 60px 0;
      font-size: 12px;
  }
  .empty .big { font-size: 28px; margin-bottom: 12px; display: block; }

  /* ── Status colours ──────────────────────────────────────── */
  .s-ai      { color: var(--green);  border-color: var(--green); }
  .s-human   { color: var(--yellow); border-color: var(--yellow); }
  .s-applied { color: var(--blue);   border-color: var(--blue); }
  .s-saved   { color: var(--purple); border-color: var(--purple); }
  .s-drop    { color: var(--red);    border-color: var(--red); }


  </style>

</head>
<body>
<div class="shell">

  <!-- Header -->
  <header>
    <div class="logo"><span>▸</span> JobRadar</div>
    <div id="stats-bar">loading stats…</div>
  </header>

  <!-- Nav -->
  <nav id="nav">
    <button class="nav-btn active" data-view="review">review</button>
    <button class="nav-btn" data-view="high_matched">high match</button>
    <button class="nav-btn" data-view="mid_matched">mid match</button>
    <button class="nav-btn" data-view="Applied">applied</button>
    <button class="nav-btn" data-view="Saved">saved</button>
    <button class="nav-btn" data-view="Drop">drop</button>
  </nav>

  <!-- Main -->
  <main>

    <!-- Card review view -->
    <div id="card-view" class="visible">
      <div class="empty"><span class="big">⟳</span>loading…</div>
    </div>

    <!-- List view -->
    <div id="list-view">
      <div class="list-header">
        <span>title</span>
        <span>company</span>
        <span>last activity</span>
        <span>status</span>
        <span></span>
      </div>
      <div id="list-body"></div>
    </div>

  </main>
</div>

<script>
  // ── State ────────────────────────────────────────────────────
  let currentView  = "review";
  let currentJobId = null;

  // ── Helpers ──────────────────────────────────────────────────
  function esc(s) {
    return String(s ?? "")
      .replace(/&/g,"&amp;").replace(/</g,"&lt;")
      .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function fmtDate(iso) {
    if (!iso) return "—";
    const d = new Date(iso);
    const pad = n => String(n).padStart(2,"0");
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} `
         + `${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  function scoreColor(s) {
    if (s >= 0.70) return "var(--green)";
    if (s >= 0.45) return "var(--yellow)";
    return "var(--red)";
  }

  function statusClass(status) {
    const map = {
      "high_matched":    "s-ai",
      "mid_matched": "s-human",
      "Applied":     "s-applied",
      "Saved":       "s-saved",
      "Drop":        "s-drop",
    };
    return map[status];
  }

  // ── Stats bar ────────────────────────────────────────────────
  async function loadStats() {
    const data  = await apiFetch("/api/stats");
    const orderMap = {
      "high_matched": "high match",
      "mid_matched": "mid match",
      "Applied": "applied",
      "Saved": "saved",
      "Drop": "drop",
    };
    const order = ["high_matched","mid_matched","Applied","Saved","Drop"];
    document.getElementById("stats-bar").innerHTML = order
    .filter(k => data[k])
    .map(
      k => `<span class="stat" onclick="switchView('${k}')">${orderMap[k]}: <span class="n">${data[k]}</span></span>`
    )
    .join("");
  }

  // ── API ──────────────────────────────────────────────────────
  async function apiFetch(url, opts = {}) {
    const r = await fetch(url, opts);
    if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
    return r.json();
  }

  async function setStatus(jobId, status) {
    await apiFetch(`/api/jobs/${jobId}/status`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ status }),
    });
  }

  async function deleteJob(jobId) {
    await apiFetch(`/api/jobs/${jobId}`, { method: "DELETE" });
  }

  // ── Nav ──────────────────────────────────────────────────────
  document.getElementById("nav").addEventListener("click", e => {
    const btn = e.target.closest(".nav-btn");
    if (!btn) return;
    switchView(btn.dataset.view);
  });

  function switchView(view) {
    currentView = view;

    // Update active tab (match case-insensitively for status names)
    document.querySelectorAll(".nav-btn").forEach(b => {
      b.classList.toggle("active", b.dataset.view === view);
    });

    const cardEl = document.getElementById("card-view");
    const listEl = document.getElementById("list-view");

    if (view === "review") {
      cardEl.classList.add("visible");
      listEl.classList.remove("visible");
      loadCard();
    } else {
      cardEl.classList.remove("visible");
      listEl.classList.add("visible");
      loadList(view === "all" ? null : view);
    }
  }

  // ── Card view ────────────────────────────────────────────────
  async function loadCard() {
    const el = document.getElementById("card-view");
    el.innerHTML = `<div class="empty"><span class="big">⟳</span>loading…</div>`;
    const job = await apiFetch("/api/jobs/next");
    if (job.done) {
      el.innerHTML = `<div class="empty"><span class="big">✓</span>all caught up.<br>run the pipeline again tomorrow.</div>`;
      return;
    }
    currentJobId = job.id;
    const score = (job.match_score ?? 0).toFixed(2);
    el.innerHTML = `
      <div class="card">
        <div class="card-score" style="color:${scoreColor(job.match_score ?? 0)}">${score}</div>
        <div class="card-title">${esc(job.title)}</div>
        <div class="card-meta">${esc(job.company)} · ${esc(job.location)}</div>
        <span class="tag ${statusClass(job.status)}">${esc(job.status)}</span>
        <a class="card-link" href="${esc(job.post_url)}" target="_blank" rel="noopener">${esc(job.post_url)}</a>
        <div class="card-actions">
          <button class="btn btn-apply" onclick="cardAction('Applied')">apply</button>
          <button class="btn btn-save"  onclick="cardAction('Saved')">save</button>
          <button class="btn btn-danger"  onclick="cardAction('Drop')">drop</button>
          <!-- <button class="btn btn-danger" onclick="cardAction('__delete__')">delete</button> -->
        </div>
      </div>`;
  }

  async function cardAction(action) {
    if (!currentJobId) return;
    document.querySelectorAll(".card-actions .btn").forEach(b => b.disabled = true);
    // if (action === "Applied") window.open(document.querySelector(".card-link")?.href, "_blank");
    if (action === "__delete__") {
      await deleteJob(currentJobId);
    } else {
      await setStatus(currentJobId, action);
    }
    await loadStats();
    await loadCard();
  }

  // ── List view ────────────────────────────────────────────────
  const ALL_STATUSES = ["high_matched","mid_matched","Applied","Saved","Drop"];

  async function loadList(status) {
    const url  = status ? `/api/jobs?status=${encodeURIComponent(status)}` : "/api/jobs";
    const jobs = await apiFetch(url);
    const body = document.getElementById("list-body");

    if (!jobs.length) {
      body.innerHTML = `<div class="empty" style="padding:40px 0">nothing here yet.</div>`;
      return;
    }

    body.innerHTML = jobs.map(j => {
      const lastActivity = j.last_operated_at ?? j.scraped_at;
      const opts = ALL_STATUSES.map(s =>
        `<option value="${s}" ${s === j.status ? "selected" : ""}>${s}</option>`
      ).join("");

      return `
        <div class="list-row" id="row-${j.id}">
          <div class="col-title">
            <a href="${esc(j.post_url)}" target="_blank" rel="noopener">${esc(j.title)}</a>
          </div>
          <div class="col-company">${esc(j.company)}</div>
          <div class="col-date">${fmtDate(lastActivity)}</div>
          <div>
            <select class="status-select" onchange="listChangeStatus('${j.id}', this.value)">
              ${opts}
            </select>
          </div>
          <div class="col-actions">
            <button class="icon-btn del" title="delete" onclick="listDelete('${j.id}')">✕</button>
          </div>
        </div>`;
    }).join("");
  }

  async function listChangeStatus(jobId, status) {
    await setStatus(jobId, status);
    await loadStats();
    // update the date cell inline without full reload
    const row = document.getElementById(`row-${jobId}`);
    if (row) row.querySelector(".col-date").textContent = fmtDate(new Date().toISOString());
  }

  async function listDelete(jobId) {
    await deleteJob(jobId);
    document.getElementById(`row-${jobId}`)?.remove();
    await loadStats();
  }

  // ── Boot ─────────────────────────────────────────────────────
  loadStats();
  loadCard();
</script>
</body>
</html>
